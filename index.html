<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Неон-сад · Grow & Collect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #0a0f22, #010007);
            font-family: 'SF Pro Display', 'Inter', system-ui, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .glass-container {
            max-width: 1200px;
            width: 100%;
            background: rgba(15, 25, 45, 0.45);
            backdrop-filter: blur(32px) saturate(200%);
            border-radius: 68px;
            border: 1px solid rgba(80, 200, 255, 0.55);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 24px 28px 32px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 28px;
            border-bottom: 1px solid #5f9eff60;
            padding-bottom: 12px;
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(125deg, #d6f0ff, #8ab3ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .stats {
            display: flex;
            gap: 24px;
            background: #071a30aa;
            border-radius: 60px;
            padding: 6px 22px;
        }
        .stat {
            color: #d9f0ff;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .garden-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
        }
        .plot-area {
            flex: 2.5;
            background: rgba(0, 18, 35, 0.5);
            border-radius: 56px;
            padding: 20px;
            backdrop-filter: blur(12px);
            border: 1px solid #6aaaff70;
        }
        .plots {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        .plot-card {
            background: #0c1b36b0;
            border-radius: 48px;
            padding: 14px 10px;
            text-align: center;
            backdrop-filter: blur(6px);
            border: 1px solid #5990ef;
            transition: 0.2s;
            cursor: pointer;
        }
        .plant-icon {
            font-size: 3rem;
            filter: drop-shadow(0 0 6px #99ffcc);
        }
        .plant-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: #cdeaff;
            margin: 6px 0;
        }
        .progress-bar {
            background: #1c3a5e;
            border-radius: 20px;
            height: 8px;
            width: 100%;
            margin: 8px 0;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #6effa3, #2eff8a);
            width: 0%;
            height: 100%;
            border-radius: 20px;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            justify-content: center;
        }
        .btn-sm {
            background: #335f9e;
            border: none;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 0.7rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-sm:hover {
            transform: scale(0.95);
            background: #4e7fc9;
        }
        .harvest-btn {
            background: #b87c2e;
        }
        .shop-area {
            flex: 1.2;
            background: rgba(0, 15, 32, 0.65);
            backdrop-filter: blur(24px);
            border-radius: 56px;
            padding: 20px;
            border: 1px solid #7badff;
        }
        .shop-title {
            font-size: 1.3rem;
            color: #c1e5ff;
            border-left: 4px solid #6effb0;
            padding-left: 12px;
            margin-bottom: 18px;
        }
        .shop-item {
            background: #10253db0;
            border-radius: 48px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .item-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .item-emoji {
            font-size: 1.8rem;
        }
        .price {
            color: #ffea9e;
            font-weight: bold;
        }
        .buy-btn {
            background: #6c3dc0b0;
            border: 1px solid #d489ff;
            border-radius: 40px;
            padding: 6px 16px;
            color: white;
            cursor: pointer;
        }
        .message {
            background: #00000070;
            border-radius: 40px;
            padding: 10px;
            margin-top: 20px;
            text-align: center;
            font-size: 0.8rem;
            color: #b7d9ff;
        }
        .reset-btn {
            background: #4b367c;
            text-align: center;
            margin-top: 18px;
            padding: 10px;
            border-radius: 60px;
            cursor: pointer;
        }
        footer {
            margin-top: 24px;
            font-size: 0.7rem;
            text-align: center;
            color: #7799cc;
        }
        @media (max-width: 700px) {
            .glass-container { padding: 16px; }
            .plots { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
        }
    </style>
</head>
<body>
<div class="glass-container">
    <div class="header">
        <h1>🌿 НЕОН-САД · Grow & Collect</h1>
        <div class="stats">
            <div class="stat">💎 <span id="coins">30</span></div>
            <div class="stat">🌸 <span id="harvests">0</span> урож.</div>
        </div>
    </div>

    <div class="garden-grid">
        <div class="plot-area">
            <div style="margin-bottom: 10px;">✨ Твои грядки ✨</div>
            <div class="plots" id="gardenPlots"></div>
        </div>
        <div class="shop-area">
            <div class="shop-title">🪴 Магазин семян</div>
            <div id="shopList"></div>
            <div class="message" id="statusMsg">🌱 Нажми на грядку, чтобы посадить. Поливай и собирай урожай!</div>
            <div class="reset-btn" id="resetGameBtn">🌀 Перезапустить сад</div>
        </div>
    </div>
    <footer>💧 Полив ускоряет рост. Новые растения открываются за урожаи и монеты.</footer>
</div>

<script>
    // ---------- ПРОСТАЯ И СТАБИЛЬНАЯ ВЕРСИЯ GARDEN CLICKER ----------
    // Работает в любом окружении, без localStorage, без звуков, без сложных таймеров
    
    // Виды растений
    const plants = {
        basic: { name: "🌼 Ромашка", emoji: "🌼", baseValue: 8, growthTime: 5, unlocked: true, cost: 0, reqHarvests: 0 },
        rose: { name: "🌹 Роза", emoji: "🌹", baseValue: 20, growthTime: 8, unlocked: false, cost: 100, reqHarvests: 3 },
        cactus: { name: "🌵 Кактус", emoji: "🌵", baseValue: 35, growthTime: 12, unlocked: false, cost: 250, reqHarvests: 8 },
        lotus: { name: "🌸 Лотос", emoji: "🌸", baseValue: 60, growthTime: 16, unlocked: false, cost: 500, reqHarvests: 15 },
        star: { name: "✨ Звездоцвет", emoji: "⭐🌿", baseValue: 100, growthTime: 22, unlocked: false, cost: 900, reqHarvests: 25 }
    };
    
    let player = {
        coins: 30,
        totalHarvests: 0
    };
    
    // Грядки: каждая { id, plantId, growth (0..1), planted }
    let plots = [];
    let nextId = 1;
    
    // Сброс/инициализация
    function initGame() {
        // разблокируем только базовое
        for (let id in plants) {
            plants[id].unlocked = (id === "basic");
        }
        player = { coins: 30, totalHarvests: 0 };
        plots = [];
        // 4 грядки
        for (let i = 0; i < 4; i++) {
            plots.push({
                id: nextId++,
                plantId: null,
                growth: 0,
                planted: false
            });
        }
        render();
    }
    
    // посадка
    function plant(plotId, plantId) {
        let plot = plots.find(p => p.id === plotId);
        if (!plot || plot.planted) {
            showMsg("❌ Эта грядка уже занята!", false);
            return false;
        }
        let plant = plants[plantId];
        if (!plant || !plant.unlocked) {
            showMsg("❌ Этот вид ещё не открыт!", false);
            return false;
        }
        plot.planted = true;
        plot.plantId = plantId;
        plot.growth = 0;
        showMsg(`🌱 Посажена ${plant.name}! Поливай, чтобы росла.`, true);
        render();
        return true;
    }
    
    // полив
    function water(plotId) {
        let plot = plots.find(p => p.id === plotId);
        if (!plot || !plot.planted) {
            showMsg("Здесь ничего не посажено!", false);
            return;
        }
        let plant = plants[plot.plantId];
        let increment = 1 / plant.growthTime * 0.4; // 40% роста за полив
        plot.growth = Math.min(1, plot.growth + increment);
        showMsg(`💧 Полив! +${Math.round(increment*100)}% роста.`, true);
        render();
    }
    
    // сбор урожая
    function harvest(plotId) {
        let plot = plots.find(p => p.id === plotId);
        if (!plot || !plot.planted) {
            showMsg("Ничего не растёт!", false);
            return;
        }
        if (plot.growth < 0.99) {
            showMsg("🌿 Растение ещё не выросло! Поливай ещё.", false);
            return;
        }
        let plant = plants[plot.plantId];
        let earned = Math.floor(plant.baseValue * (1 + player.totalHarvests / 100));
        player.coins += earned;
        player.totalHarvests++;
        plot.planted = false;
        plot.plantId = null;
        plot.growth = 0;
        showMsg(`🎉 Собран ${plant.name}! +${earned} монет.`, true);
        
        // Проверка открытия новых видов
        checkUnlocks();
        render();
    }
    
    function checkUnlocks() {
        let anyUnlock = false;
        for (let id in plants) {
            let p = plants[id];
            if (!p.unlocked && player.totalHarvests >= p.reqHarvests && player.coins >= p.cost) {
                p.unlocked = true;
                anyUnlock = true;
                showMsg(`✨ Новый вид доступен: ${p.name}! Купи его в магазине за ${p.cost} монет.`, true);
            }
        }
        if (anyUnlock) renderShop();
    }
    
    function buyPlant(plantId) {
        let plant = plants[plantId];
        if (!plant || plant.unlocked) {
            showMsg("Уже открыто или не существует.", false);
            return;
        }
        if (player.coins >= plant.cost && player.totalHarvests >= plant.reqHarvests) {
            player.coins -= plant.cost;
            plant.unlocked = true;
            showMsg(`✅ Теперь вы можете сажать ${plant.name}!`, true);
            renderShop();
            render();
        } else {
            showMsg(`❌ Не хватает монет (нужно ${plant.cost}) или урожаев (${plant.reqHarvests})`, false);
        }
    }
    
    function showMsg(text, isGood) {
        let msgDiv = document.getElementById("statusMsg");
        msgDiv.innerHTML = `<span style="color:${isGood ? '#bbffcc' : '#ffbc8f'}">✨ ${text} ✨</span>`;
        setTimeout(() => {
            if (document.getElementById("statusMsg").innerHTML.includes(text))
                msgDiv.innerHTML = "🌱 Нажми на грядку, чтобы посадить. Поливай и собирай урожай!";
        }, 2200);
    }
    
    // отрисовка сада
    function render() {
        const container = document.getElementById("gardenPlots");
        container.innerHTML = "";
        for (let plot of plots) {
            let plant = plot.plantId ? plants[plot.plantId] : null;
            let icon = plant ? plant.emoji : "🟫";
            let name = plant ? plant.name : "Пусто";
            let progress = plot.growth * 100;
            let card = document.createElement("div");
            card.className = "plot-card";
            card.innerHTML = `
                <div class="plant-icon">${icon}</div>
                <div class="plant-name">${name}</div>
                ${plot.planted ? `<div class="progress-bar"><div class="progress-fill" style="width: ${progress}%;"></div></div>` : `<div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>`}
                <div class="action-buttons">
                    ${plot.planted ? `<button class="btn-sm" data-action="water" data-id="${plot.id}">💧 Полить</button>` : `<button class="btn-sm" data-action="plant" data-id="${plot.id}">🌱 Посадить</button>`}
                    ${plot.planted && plot.growth >= 0.99 ? `<button class="btn-sm harvest-btn" data-action="harvest" data-id="${plot.id}">💰 Собрать</button>` : ''}
                </div>
                ${plot.planted && plant ? `<div style="font-size:0.7rem; margin-top:4px;">💰 ${Math.floor(plant.baseValue)} монет</div>` : ''}
            `;
            container.appendChild(card);
        }
        
        // обработчики
        document.querySelectorAll("[data-action='water']").forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                water(parseInt(btn.dataset.id));
            };
        });
        document.querySelectorAll("[data-action='harvest']").forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                harvest(parseInt(btn.dataset.id));
            };
        });
        document.querySelectorAll("[data-action='plant']").forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                showPlantMenu(parseInt(btn.dataset.id));
            };
        });
        
        document.getElementById("coins").innerText = Math.floor(player.coins);
        document.getElementById("harvests").innerText = player.totalHarvests;
    }
    
    function showPlantMenu(plotId) {
        // список доступных растений
        let available = [];
        for (let id in plants) {
            if (plants[id].unlocked) available.push({ id, ...plants[id] });
        }
        if (available.length === 0) return;
        let overlay = document.createElement("div");
        overlay.style.position = "fixed";
        overlay.style.top = "0";
        overlay.style.left = "0";
        overlay.style.width = "100%";
        overlay.style.height = "100%";
        overlay.style.backgroundColor = "rgba(0,0,0,0.75)";
        overlay.style.backdropFilter = "blur(12px)";
        overlay.style.zIndex = "1000";
        overlay.style.display = "flex";
        overlay.style.alignItems = "center";
        overlay.style.justifyContent = "center";
        let modal = document.createElement("div");
        modal.style.background = "#10243eb0";
        modal.style.backdropFilter = "blur(28px)";
        modal.style.borderRadius = "56px";
        modal.style.padding = "24px";
        modal.style.width = "280px";
        modal.style.border = "1px solid #9ac8ff";
        modal.innerHTML = `<h3 style="color:white; margin-bottom:16px;">🌱 Выбери семена</h3>`;
        available.forEach(plant => {
            let btn = document.createElement("button");
            btn.innerText = `${plant.emoji} ${plant.name}`;
            btn.style.display = "block";
            btn.style.width = "100%";
            btn.style.margin = "8px 0";
            btn.style.padding = "10px";
            btn.style.borderRadius = "60px";
            btn.style.background = "#3b62a0";
            btn.style.border = "none";
            btn.style.color = "white";
            btn.onclick = () => {
                plantOnPlotConfirm(plotId, plant.id);
                document.body.removeChild(overlay);
            };
            modal.appendChild(btn);
        });
        let cancel = document.createElement("button");
        cancel.innerText = "Отмена";
        cancel.style.marginTop = "12px";
        cancel.style.background = "#6a4c8c";
        cancel.style.borderRadius = "60px";
        cancel.style.padding = "8px";
        cancel.style.border = "none";
        cancel.style.color = "white";
        cancel.onclick = () => document.body.removeChild(overlay);
        modal.appendChild(cancel);
        overlay.appendChild(modal);
        document.body.appendChild(overlay);
    }
    
    function plantOnPlotConfirm(plotId, plantId) {
        let plot = plots.find(p => p.id === plotId);
        if (!plot || plot.planted) {
            showMsg("Грядка занята!", false);
            return;
        }
        plant(plotId, plantId);
    }
    
    function renderShop() {
        const shopDiv = document.getElementById("shopList");
        shopDiv.innerHTML = "";
        for (let id in plants) {
            if (id === "basic") continue;
            let p = plants[id];
            if (!p.unlocked) {
                let item = document.createElement("div");
                item.className = "shop-item";
                item.innerHTML = `
                    <div class="item-info">
                        <div class="item-emoji">${p.emoji}</div>
                        <div><strong>${p.name}</strong><br><span class="price">${p.cost} 💎</span><br>🌾 нужно ${p.reqHarvests} урожаев</div>
                    </div>
                    <button class="buy-btn" data-id="${id}">🔓 Купить</button>
                `;
                shopDiv.appendChild(item);
            } else if (!p.unlocked === false && id !== "basic") {
                // уже открыто — показываем как доступное
                let item = document.createElement("div");
                item.className = "shop-item";
                item.style.opacity = "0.7";
                item.innerHTML = `
                    <div class="item-info">
                        <div class="item-emoji">${p.emoji}</div>
                        <div>${p.name} <span style="color:#aaffaa;">✓ открыт</span></div>
                    </div>
                `;
                shopDiv.appendChild(item);
            }
        }
        // добавить простой бустер (улучшение роста)
        let booster = document.createElement("div");
        booster.className = "shop-item";
        booster.innerHTML = `
            <div class="item-info">
                <div class="item-emoji">💧✨</div>
                <div>Удобрение (навсегда)<br> +20% к скорости роста</div>
            </div>
            <button class="buy-btn" id="boostBtn">${player.boostBought ? "Куплено" : "150 💎"}</button>
        `;
        if (!player.boostBought) {
            shopDiv.appendChild(booster);
        } else {
            let already = document.createElement("div");
            already.className = "shop-item";
            already.innerHTML = `<div class="item-info"><div class="item-emoji">💪</div><div>Удобрение активно +20% рост</div></div>`;
            shopDiv.appendChild(already);
        }
        
        document.querySelectorAll(".buy-btn[data-id]").forEach(btn => {
            btn.onclick = () => buyPlant(btn.dataset.id);
        });
        const boostBtn = document.getElementById("boostBtn");
        if (boostBtn && !player.boostBought) {
            boostBtn.onclick = () => {
                if (player.coins >= 150) {
                    player.coins -= 150;
                    player.boostBought = true;
                    player.growthMultiplier = 1.2;
                    showMsg("🌿 Удобрение куплено! Рост ускорен на 20%", true);
                    renderShop();
                    render();
                } else {
                    showMsg("Не хватает 150 монет", false);
                }
            };
        }
    }
    
    // пассивный рост (таймер)
    let growInterval = null;
    function startPassiveGrowth() {
        if (growInterval) clearInterval(growInterval);
        growInterval = setInterval(() => {
            let multiplier = player.boostBought ? 1.2 : 1.0;
            for (let plot of plots) {
                if (plot.planted && plot.growth < 1) {
                    let plant = plants[plot.plantId];
                    if (plant) {
                        let increment = (1 / plant.growthTime) * 0.03 * multiplier;
                        plot.growth = Math.min(1, plot.growth + increment);
                    }
                }
            }
            render();
        }, 1500);
    }
    
    function resetGame() {
        if (confirm("Перезапустить сад? Весь прогресс исчезнет.")) {
            initGame();
            player.boostBought = false;
            player.growthMultiplier = 1.0;
            renderShop();
            render();
            showMsg("Сад перерождён! Начинай сначала.", true);
        }
    }
    
    // инициализация
    initGame();
    player.boostBought = false;
    player.growthMultiplier = 1.0;
    renderShop();
    startPassiveGrowth();
    document.getElementById("resetGameBtn").onclick = resetGame;
</script>
</body>
</html>
